<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON GLIDE — 데일리 챌린지</title>
<meta name="description" content="매일 바뀌는 네온 코스를 활공하라. 오늘의 코스는 전 세계 모두에게 동일합니다.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05010f;
    overflow: hidden;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game { display: block; width: 100vw; height: 100vh; }
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: rgba(5, 1, 15, 0.72);
    backdrop-filter: blur(6px);
    color: #e8e6ff;
    text-align: center;
    z-index: 10;
    padding: 24px;
  }
  .overlay.hidden { display: none; }
  h1 {
    font-size: clamp(38px, 9vw, 72px);
    font-weight: 800;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, #00f0ff, #ff2df7, #ffe14d);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(255, 45, 247, 0.45));
  }
  .sub { font-size: 15px; opacity: 0.85; line-height: 1.6; }
  .seed-tag {
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid rgba(0, 240, 255, 0.5);
    border-radius: 999px;
    color: #7ff5ff;
    box-shadow: 0 0 12px rgba(0, 240, 255, 0.25) inset, 0 0 10px rgba(0, 240, 255, 0.2);
  }
  .big-score {
    font-size: clamp(52px, 12vw, 96px);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 24px #00f0ff, 0 0 60px rgba(0,240,255,.5);
  }
  .best { font-size: 14px; color: #ffe14d; text-shadow: 0 0 10px rgba(255,225,77,.6); }
  button {
    font-size: 17px; font-weight: 700;
    padding: 14px 34px;
    border: none; border-radius: 14px;
    cursor: pointer;
    color: #05010f;
    background: linear-gradient(90deg, #00f0ff, #6a5bff);
    box-shadow: 0 0 24px rgba(0, 240, 255, 0.55);
    transition: transform .12s ease;
  }
  button:active { transform: scale(0.94); }
  button.ghost {
    background: transparent;
    color: #ff8df9;
    border: 1.5px solid #ff2df7;
    box-shadow: 0 0 16px rgba(255, 45, 247, 0.35);
  }
  #hud {
    position: fixed; top: 16px; left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 5;
  }
  #hud span {
    font-size: 34px; font-weight: 800; color: #fff;
    text-shadow: 0 0 16px #00f0ff;
  }
  #toast {
    position: fixed; bottom: 34px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0, 240, 255, 0.14);
    border: 1px solid rgba(0, 240, 255, 0.6);
    color: #bffaff;
    padding: 10px 22px; border-radius: 999px;
    font-size: 14px;
    opacity: 0; transition: all .3s ease;
    pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #mute {
    position: fixed; top: 14px; right: 18px; z-index: 15;
    font-size: 24px; cursor: pointer; opacity: 0.75;
  }
  #mute:hover { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><span id="score-live"></span></div>
<div id="mute">🔊</div>

<div class="overlay" id="start-screen">
  <h1>NEON GLIDE</h1>
  <div class="seed-tag" id="seed-tag-start"></div>
  <p class="sub">누르고 있으면 상승, 떼면 하강.<br>네온 게이트를 통과하며 최대한 멀리 활공하세요.<br>⭐ 별은 +1점 · 움직이는 게이트 주의 · 🔴 레이저는 꺼진 순간 통과!<br><b>오늘의 코스는 전 세계 모두 동일합니다.</b></p>
  <div class="best" id="best-start"></div>
  <button id="btn-start">오늘의 코스 시작</button>
</div>

<div class="overlay hidden" id="over-screen">
  <div class="sub">GAME OVER</div>
  <div class="big-score" id="final-score">0</div>
  <div class="best" id="best-over"></div>
  <div class="seed-tag" id="seed-tag-over"></div>
  <button id="btn-share">📤 점수 공유하기</button>
  <button class="ghost" id="btn-retry">다시 도전</button>
</div>

<div id="toast"></div>

<script>
(() => {
  'use strict';

  // ---------- 데일리 시드 (KST 기준: 전 세계 유저가 같은 날 같은 코스) ----------
  const kstNow = new Date(Date.now() + 9 * 3600 * 1000);
  const dateStr = kstNow.toISOString().slice(0, 10);

  function hashStr(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(seed) {
    let a = seed >>> 0;
    return () => {
      a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ---------- 캔버스 ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 1.5);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- 상태 ----------
  const NEONS = ['#00f0ff', '#ff2df7', '#ffe14d', '#39ff88', '#6a5bff'];
  const BEST_KEY = 'neonglide-best-' + dateStr;
  let state = 'idle';            // idle | play | over
  let rng, gates = [], particles = [], coins = [];
  let stars = seededStars(mulberry32(hashStr('STARS:' + dateStr)));
  let player, speed, score, dist, holding, elapsed;
  let shakeT = 0;

  function seededStars(seedRng) {
    const arr = [];
    for (let i = 0; i < 90; i++) {
      arr.push({
        x: seedRng() * 1.2, y: seedRng(),          // 화면 비율 좌표
        r: 0.6 + seedRng() * 1.6,
        depth: 0.15 + seedRng() * 0.55,
        tw: seedRng() * Math.PI * 2
      });
    }
    return arr;
  }

  function reset() {
    rng = mulberry32(hashStr('NEONGLIDE:' + dateStr));
    stars = seededStars(mulberry32(hashStr('STARS:' + dateStr)));
    gates = [];
    particles = [];
    coins = [];
    player = { x: 0, y: H / 2, vy: 0, trail: [] };
    speed = 200;                 // px/s
    score = +(new URLSearchParams(location.search).get('debug')) || 0;
    dist = 0; elapsed = 0;
    holding = false;
    let gx = W + 200;
    for (let i = 0; i < 6; i++) {
      gates.push(makeGate(gx));
      const gap = gapBetween();
      maybeCoin(gx, gx + gap);
      gx += gap;
    }
  }

  function gapBetween() { return 380 + rng() * 140; }

  function makeGate(x) {
    const margin = 90;
    const gapH = Math.max(160, 340 - score * 4);     // 진행할수록 좁아짐
    const cy = margin + gapH / 2 + rng() * (H - margin * 2 - gapH);
    const g = {
      x, cy, gapH,
      color: NEONS[(rng() * NEONS.length) | 0],
      passed: false,
      pulse: rng() * Math.PI * 2,
      type: 'static', amp: 0, phase: rng() * Math.PI * 2
    };
    const roll = rng();
    if (score >= 4 && roll < 0.35) {
      g.type = 'mover';
      g.amp = 40 + Math.min(80, score * 2);
    } else if (score >= 9 && roll < 0.6) {
      g.type = 'laser';
      g.color = '#ff2d55';
    }
    return g;
  }

  function maybeCoin(fromX, toX) {
    if (rng() < 0.55) {
      coins.push({
        x: fromX + (toX - fromX) * (0.35 + rng() * 0.3),
        y: 80 + rng() * (H - 160),
        taken: false,
        spin: rng() * 7
      });
    }
  }

  // 무버 게이트의 현재 틈 중심 (시간에 따라 상하 이동)
  function gateCY(g) {
    if (g.type !== 'mover') return g.cy;
    const half = g.gapH / 2;
    const cy = g.cy + Math.sin(elapsed * 2.2 + g.phase) * g.amp;
    return Math.max(half + 30, Math.min(H - half - 30, cy));
  }
  function laserPhase(g) { return (elapsed + g.pulse) % 1.6; }
  function laserOn(g) { return laserPhase(g) < 0.7; }      // 0.7초 켜짐 / 0.9초 꺼짐
  function laserWarn(g) { return laserPhase(g) > 1.35; }   // 켜지기 직전 예고

  // ---------- 사운드 (WebAudio 신스웨이브, 외부 파일 없음) ----------
  let ac = null, musicTimer = null, musicStep = 0;
  let soundOn = localStorage.getItem('neonglide-sound') !== '0';

  function ensureAudio() {
    if (!soundOn) return;
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    if (!musicTimer) musicTimer = setInterval(musicTick, 224);   // ≈134BPM 8분음표
  }
  function tone(freq, dur, type, vol, slideTo) {
    if (!ac || !soundOn) return;
    const o = ac.createOscillator(), g = ac.createGain(), t0 = ac.currentTime;
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noiseHit(dur, vol, hpFreq) {
    if (!ac || !soundOn) return;
    const len = (ac.sampleRate * dur) | 0;
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hpFreq;
    const g = ac.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start();
  }
  const BASSLINE = [55, 55, 82.41, 55, 65.41, 65.41, 98, 73.42];
  const ARP = [440, 554.37, 659.26, 880, 1108.7, 880, 659.26, 554.37];
  function musicTick() {
    if (!ac || !soundOn) return;
    if (musicStep % 4 === 0) tone(140, 0.13, 'sine', 0.4, 45);                      // 킥
    if (musicStep % 4 === 2) noiseHit(0.05, 0.1, 6000);                             // 햇
    tone(BASSLINE[musicStep % 8], 0.2, 'sawtooth', 0.05);                           // 베이스
    if (state === 'play') tone(ARP[musicStep % 8], 0.14, 'triangle', 0.03);         // 아르페지오
    musicStep++;
  }
  function passSfx() { tone(520 + Math.min(500, score * 14), 0.09, 'sine', 0.14, 820 + Math.min(500, score * 14)); }
  function coinSfx() { tone(1318.5, 0.07, 'square', 0.07); setTimeout(() => tone(1760, 0.1, 'square', 0.07), 60); }
  function dieSfx() { tone(320, 0.5, 'sawtooth', 0.22, 50); noiseHit(0.35, 0.2, 700); }

  const muteBtn = document.getElementById('mute');
  function syncMute() { muteBtn.textContent = soundOn ? '🔊' : '🔇'; }
  muteBtn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    soundOn = !soundOn;
    localStorage.setItem('neonglide-sound', soundOn ? '1' : '0');
    if (soundOn) ensureAudio();
    else if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    syncMute();
  });
  syncMute();

  // ---------- 입력 ----------
  function press(e) { if (state === 'play') { holding = true; e.preventDefault(); } }
  function release() { holding = false; }
  window.addEventListener('pointerdown', press);
  window.addEventListener('pointerup', release);
  window.addEventListener('pointercancel', release);
  window.addEventListener('keydown', e => { if (e.code === 'Space') { press(e); } });
  window.addEventListener('keyup', e => { if (e.code === 'Space') release(); });

  // ---------- 게임 루프 ----------
  let lastT = 0;
  function loop(t) {
    const dt = Math.min((t - lastT) / 1000, 0.033);
    lastT = t;
    if (state === 'play') update(dt);
    draw(t / 1000);
    requestAnimationFrame(loop);
  }

  function update(dt) {
    elapsed += dt;
    speed += dt * 5;                                  // 서서히 가속
    const px = W * 0.28;
    player.x = px;

    // 활공 물리: 누르면 부드럽게 상승, 떼면 하강
    const target = holding ? -370 : 370;
    player.vy += (target - player.vy) * Math.min(1, dt * 3.6);
    player.y += player.vy * dt;

    player.trail.unshift({ x: px, y: player.y });
    if (player.trail.length > 22) player.trail.pop();
    for (const p of player.trail) p.x -= speed * dt;

    // 천장/바닥 충돌
    if (player.y < 14 || player.y > H - 14) return die();

    // 게이트 이동/충돌/점수
    dist += speed * dt;
    for (const g of gates) {
      g.x -= speed * dt;
      const cy = gateCY(g);
      const halfGap = g.gapH / 2, gateW = 26;
      if (Math.abs(g.x - px) < gateW / 2 + 12) {
        if (player.y < cy - halfGap + 10 || player.y > cy + halfGap - 10) return die();
        if (g.type === 'laser' && laserOn(g)) return die();   // 켜진 레이저 통과 = 사망
      }
      if (!g.passed && g.x < px) {
        g.passed = true;
        score++;
        passSfx();
        burst(px, player.y, g.color, 14);
        document.getElementById('score-live').textContent = score;
      }
    }
    if (gates[0].x < -60) {
      gates.shift();
      const gap = gapBetween();
      const nx = gates[gates.length - 1].x + gap;
      gates.push(makeGate(nx));
      maybeCoin(nx - gap, nx);
    }

    // 별 수집
    for (const c of coins) {
      c.x -= speed * dt;
      if (!c.taken && Math.hypot(c.x - px, c.y - player.y) < 26) {
        c.taken = true;
        score++;
        coinSfx();
        burst(c.x, c.y, '#ffe14d', 12);
        document.getElementById('score-live').textContent = score;
      }
    }
    while (coins.length && coins[0].x < -40) coins.shift();

    // 파티클
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shakeT > 0) shakeT -= dt;
  }

  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 220;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.4 + Math.random() * 0.5, color });
    }
  }

  function die() {
    state = 'over';
    dieSfx();
    shakeT = 0.35;
    burst(player.x, player.y, '#ff2d55', 40);
    const best = Math.max(score, +(localStorage.getItem(BEST_KEY) || 0));
    localStorage.setItem(BEST_KEY, best);
    document.getElementById('final-score').textContent = score;
    document.getElementById('best-over').textContent = `오늘의 최고 기록: ${best}`;
    document.getElementById('score-live').textContent = '';
    setTimeout(() => document.getElementById('over-screen').classList.remove('hidden'), 450);
  }

  // ---------- 렌더 ----------
  function draw(t) {
    ctx.save();
    if (shakeT > 0) ctx.translate((Math.random() - .5) * shakeT * 30, (Math.random() - .5) * shakeT * 30);

    // 배경
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0220'); bg.addColorStop(0.6, '#05010f'); bg.addColorStop(1, '#120432');
    ctx.fillStyle = bg;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // 별 (패럴랙스)
    const scroll = state === 'play' ? dist : t * 40;
    for (const s of stars) {
      const x = ((s.x * W - scroll * s.depth) % (W * 1.2) + W * 1.2) % (W * 1.2) - W * 0.1;
      const a = 0.35 + 0.5 * Math.abs(Math.sin(t * 1.5 + s.tw));
      ctx.globalAlpha = a * s.depth * 1.6;
      ctx.fillStyle = '#cfeaff';
      ctx.beginPath(); ctx.arc(x, s.y * H, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 그리드 바닥 (신스웨이브 느낌)
    ctx.strokeStyle = 'rgba(106, 91, 255, 0.22)';
    ctx.lineWidth = 1;
    const gridOff = (scroll * 0.6) % 70;
    for (let x = -gridOff; x < W; x += 70) {
      ctx.beginPath(); ctx.moveTo(x, H * 0.82); ctx.lineTo(x - 90, H); ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const y = H * 0.82 + (H * 0.18) * (i / 4) ** 1.6;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 게이트 (글로우는 shadowBlur 대신 저비용 반투명 레이어)
    if (state !== 'idle') {
      for (const g of gates) {
        if (g.x < -40 || g.x > W + 40) continue;     // 화면 밖 게이트 스킵
        const cy = gateCY(g);
        const half = g.gapH / 2;
        const pulse = 0.75 + 0.25 * Math.sin(t * 5 + g.pulse);
        const topH = cy - half + 10;
        const botY = cy + half;
        ctx.fillStyle = g.color;
        ctx.globalAlpha = 0.13 * pulse;
        roundRect(g.x - 17, -10, 34, topH, 12);
        roundRect(g.x - 17, botY, 34, H - botY + 10, 12);
        ctx.globalAlpha = 0.3 * pulse;
        roundRect(g.x - 12, -10, 24, topH, 10);
        roundRect(g.x - 12, botY, 24, H - botY + 10, 10);
        ctx.globalAlpha = 1;
        roundRect(g.x - 8, -10, 16, topH, 8);
        roundRect(g.x - 8, botY, 16, H - botY + 10, 8);
        // 게이트 끝 캡
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.25;
        ctx.beginPath(); ctx.arc(g.x, cy - half, 9 * pulse + 3, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(g.x, cy + half, 9 * pulse + 3, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.arc(g.x, cy - half, 5 * pulse + 2, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(g.x, cy + half, 5 * pulse + 2, 0, 7); ctx.fill();
        // 레이저 빔: 켜지면 붉게, 켜지기 직전엔 흐릿한 예고
        if (g.type === 'laser') {
          const on = laserOn(g), warn = laserWarn(g);
          if (on || warn) {
            ctx.strokeStyle = '#ff2d55';
            if (on) {
              const flick = 0.75 + 0.25 * Math.sin(t * 40);
              ctx.globalAlpha = 0.25 * flick;
              ctx.lineWidth = 11;
              ctx.beginPath(); ctx.moveTo(g.x, cy - half + 4); ctx.lineTo(g.x, cy + half - 4); ctx.stroke();
              ctx.globalAlpha = flick;
              ctx.lineWidth = 4;
              ctx.beginPath(); ctx.moveTo(g.x, cy - half + 4); ctx.lineTo(g.x, cy + half - 4); ctx.stroke();
              ctx.strokeStyle = '#ffd7de';
              ctx.globalAlpha = 0.9;
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.moveTo(g.x, cy - half + 4); ctx.lineTo(g.x, cy + half - 4); ctx.stroke();
            } else {
              ctx.globalAlpha = 0.22;
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.moveTo(g.x, cy - half + 4); ctx.lineTo(g.x, cy + half - 4); ctx.stroke();
            }
            ctx.globalAlpha = 1;
          }
        }
      }

      // 별
      for (const c of coins) {
        if (c.taken || c.x < -30 || c.x > W + 30) continue;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.fillStyle = '#ffe14d';
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(0, 0, 17, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.rotate(t * 2 + c.spin);
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i % 2 ? 4.5 : 10, a = i * Math.PI / 5 - Math.PI / 2;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // 파티클
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life * 1.6);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 플레이어 + 트레일
    if (state === 'play' || (state === 'over' && shakeT > 0)) {
      for (let i = player.trail.length - 1; i > 0; i--) {
        const p = player.trail[i];
        ctx.globalAlpha = (1 - i / player.trail.length) * 0.5;
        ctx.fillStyle = '#00f0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 8 * (1 - i / player.trail.length) + 1, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (state === 'play') {
        const tilt = Math.max(-0.5, Math.min(0.5, player.vy / 700));
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(tilt);
        ctx.fillStyle = '#00f0ff';
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, 7); ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(2, 0, 13, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#eafcff';
        ctx.beginPath();
        ctx.moveTo(16, 0); ctx.lineTo(-12, -9); ctx.lineTo(-6, 0); ctx.lineTo(-12, 9);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, Math.max(h, 0), r);
    ctx.fill();
  }

  // ---------- UI ----------
  const startScreen = document.getElementById('start-screen');
  const overScreen = document.getElementById('over-screen');
  document.getElementById('seed-tag-start').textContent = `📅 오늘의 코스 · ${dateStr}`;
  document.getElementById('seed-tag-over').textContent = `📅 ${dateStr} 데일리 코스`;
  const savedBest = localStorage.getItem(BEST_KEY);
  if (savedBest) document.getElementById('best-start').textContent = `오늘의 최고 기록: ${savedBest}`;

  function startGame() {
    ensureAudio();
    reset();
    state = 'play';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    document.getElementById('score-live').textContent = score;
  }
  document.getElementById('btn-start').addEventListener('click', e => { e.stopPropagation(); startGame(); });
  document.getElementById('btn-retry').addEventListener('click', e => { e.stopPropagation(); startGame(); });

  // ---------- 점수 공유 ----------
  document.getElementById('btn-share').addEventListener('click', async e => {
    e.stopPropagation();
    const text = `🛸 NEON GLIDE ${dateStr}\n오늘의 코스에서 ${score}점 기록!\n같은 코스에서 나를 이겨보세요 👉 ${location.href}`;
    try {
      if (navigator.share) {
        await navigator.share({ text });
      } else {
        await navigator.clipboard.writeText(text);
        toast('점수가 클립보드에 복사됐어요! 친구에게 붙여넣기 📋');
      }
    } catch (_) { /* 사용자가 공유 취소 */ }
  });

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
})();
</script>
</body>
</html>
