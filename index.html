  let stars = seededStars(mulberry32(hashStr('STARS:' + dateStr)));
  let player, speed, score, dist, holding, elapsed;
  let gatesPassed = 0, mult = 1;
  let shakeT = 0;

  function updateHud() {
    document.getElementById('score-live').textContent = score;
    const badge = document.getElementById('mult-badge');
    badge.textContent = mult > 1 ? '×' + mult : '';
    badge.classList.toggle('fever', mult >= 5);
  }
  function popup(x, y, txt, color) {
    popups.push({ x, y, txt, color, life: 0.9 });
  }

  function seededStars(seedRng) {
    const arr = [];
    for (let i = 0; i < 90; i++) {
      arr.push({
        x: seedRng() * 1.2, y: seedRng(),
        r: 0.6 + seedRng() * 1.6,
        depth: 0.15 + seedRng() * 0.55,
        tw: seedRng() * Math.PI * 2
      });
    }
    return arr;
  }

  function reset() {
    rng = mulberry32(hashStr('NEONGLIDE:' + dateStr));
    stars = seededStars(mulberry32(hashStr('STARS:' + dateStr)));
    gates = [];
    particles = [];
    coins = [];
    popups = [];
    player = { x: 0, y: H / 2, vy: 0, trail: [] };
    speed = 200;                 // px/s
    gatesPassed = +(new URLSearchParams(location.search).get('debug')) || 0;
    score = gatesPassed * 10;
    mult = 1 + Math.min(9, (gatesPassed / 5) | 0);
    dist = 0; elapsed = 0;
    holding = false;
    let gx = W + 200;
    for (let i = 0; i < 6; i++) {
      gates.push(makeGate(gx));
      const gap = gapBetween();
      maybeCoin(gx, gx + gap);
      gx += gap;
    }
  }

  function gapBetween() { return 380 + rng() * 140; }

  function makeGate(x) {
    const margin = 90;
    const gapH = Math.max(160, 340 - gatesPassed * 6);   // 진행할수록 좁아짐
    const cy = margin + gapH / 2 + rng() * (H - margin * 2 - gapH);
    const g = {
      x, cy, gapH,
      color: NEONS[(rng() * NEONS.length) | 0],
      passed: false,
      pulse: rng() * Math.PI * 2,
      type: 'static', amp: 0, phase: rng() * Math.PI * 2,
      segTop: rng() < 0.5                            // 레이저가 틈의 위/아래 어느 쪽을 막는지
    };
    const roll = rng();
    if (gatesPassed >= 4 && roll < 0.35) {
      g.type = 'mover';
      g.amp = 40 + Math.min(80, gatesPassed * 3);
    } else if (gatesPassed >= 8 && roll < 0.62) {
      g.type = 'laser';
    }
    return g;
  }

  function maybeCoin(fromX, toX) {
    if (rng() < 0.55) {
      coins.push({
        x: fromX + (toX - fromX) * (0.35 + rng() * 0.3),
        y: 80 + rng() * (H - 160),
        taken: false,
        spin: rng() * 7
      });
    }
  }

  // 무버 게이트의 현재 틈 중심 (시간에 따라 상하 이동)
  function gateCY(g) {
    if (g.type !== 'mover') return g.cy;
    const half = g.gapH / 2;
    const cy = g.cy + Math.sin(elapsed * 2.2 + g.phase) * g.amp;
    return Math.max(half + 30, Math.min(H - half - 30, cy));
  }
  // 레이저는 틈의 55%만 막는다 — 반대쪽은 언제나 열린 통로 (완전 차단 없음)
  const LASER_FRAC = 0.55;
  function laserSeg(g, cy) {
    const half = g.gapH / 2, segLen = g.gapH * LASER_FRAC;
    return g.segTop
      ? [cy - half, cy - half + segLen]
      : [cy + half - segLen, cy + half];
  }
  function laserPhase(g) { return (elapsed + g.pulse) % 1.6; }
  function laserOn(g) { return laserPhase(g) < 0.7; }
  function laserWarn(g) { return laserPhase(g) > 1.35; }

  // ---------- 사운드 (WebAudio 펑키 일렉트로, 외부 파일 없음) ----------
  let ac = null, master = null, delaySend = null, musicTimer = null, musicStep = 0;
  let soundOn = localStorage.getItem('neonglide-sound') !== '0';

  function ensureAudio() {
    if (!soundOn) return;
    if (!ac) {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createDynamicsCompressor();
      master.threshold.value = -18;
      master.ratio.value = 5;
      master.connect(ac.destination);
      const dly = ac.createDelay(1);
      dly.delayTime.value = 0.2381;                  // 16분음표 2개 (126BPM)
      const fb = ac.createGain(); fb.gain.value = 0.35;
      const wet = ac.createGain(); wet.gain.value = 0.45;
      dly.connect(fb); fb.connect(dly);
      dly.connect(wet); wet.connect(master);
      delaySend = dly;
    }
    if (ac.state === 'suspended') ac.resume();
    if (!musicTimer) musicTimer = setInterval(musicTick, 119);   // 126BPM 16분음표
  }
  function tone(freq, dur, type, vol, opts) {
    if (!ac || !soundOn) return;
    opts = opts || {};
    const o = ac.createOscillator(), g = ac.createGain(), t0 = ac.currentTime;
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(opts.slideTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    let node = o;
    if (opts.lp) {
      const f = ac.createBiquadFilter();
      f.type = 'lowpass'; f.Q.value = opts.q || 1;
      f.frequency.setValueAtTime(opts.lp, t0);
      if (opts.lpEnd) f.frequency.exponentialRampToValueAtTime(opts.lpEnd, t0 + dur);
      o.connect(f); node = f;
    }
    node.connect(g);
    g.connect(opts.echo ? delaySend : master);
    if (opts.echo) g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noiseHit(dur, vol, fType, fFreq, q) {
    if (!ac || !soundOn) return;
    const len = (ac.sampleRate * dur) | 0;
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = fType; f.frequency.value = fFreq; f.Q.value = q || 1;
    const g = ac.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start();
  }
  // 32스텝(2마디) 펑키 그루브 — A마이너
  const BASS = { 0:[55,.24], 3:[55,.1], 6:[110,.1], 8:[82.41,.22], 11:[55,.1], 14:[98,.12], 16:[55,.24], 19:[55,.1], 22:[110,.1], 24:[87.31,.22], 27:[65.41,.1], 30:[73.42,.12] };
  const LEAD = { 0:440, 2:523.25, 4:587.33, 6:659.25, 10:523.25, 12:440, 16:659.25, 18:783.99, 20:880, 24:659.25, 26:587.33, 28:523.25 };
  const STAB = { 6:[220,261.63,329.63,392], 22:[196,246.94,293.66,349.23] };
  function musicTick() {
    if (!ac || !soundOn) return;
    const s = musicStep % 32;
    if (s % 4 === 0) tone(150, 0.13, 'sine', 0.5, { slideTo: 42 });                 // 킥 (4-on-floor)
    if (s === 14 || s === 30) tone(150, 0.09, 'sine', 0.25, { slideTo: 50 });       // 고스트 킥
    if (s % 8 === 4) noiseHit(0.1, 0.16, 'bandpass', 1800, 0.8);                    // 클랩 백비트
    noiseHit(0.025, s % 2 ? 0.05 : 0.028, 'highpass', 8200);                        // 클로즈드 햇
    if (s % 8 === 2) noiseHit(0.13, 0.05, 'highpass', 7000);                        // 오픈 햇
    const b = BASS[s];
    if (b) tone(b[0], b[1], 'sawtooth', 0.11, { lp: 900, lpEnd: 220, q: 2 });       // 펑키 베이스
    const st = STAB[s];
    if (st) for (const f of st) tone(f, 0.16, 'sawtooth', 0.016, { lp: 1500 });     // 코드 스탭
    if (state === 'play' && LEAD[s]) tone(LEAD[s], 0.13, 'triangle', mult >= 5 ? 0.06 : 0.035, { echo: true }); // 리드 (피버 시 강화)
    musicStep++;
  }
  function passSfx() { tone(520 + Math.min(500, gatesPassed * 18), 0.09, 'sine', 0.14, { slideTo: 820 + Math.min(500, gatesPassed * 18) }); }
  function coinSfx() { tone(1318.5, 0.07, 'square', 0.07); setTimeout(() => tone(1760, 0.1, 'square', 0.07), 60); }
  function multSfx() { tone(880, 0.09, 'triangle', 0.09); setTimeout(() => tone(1174.7, 0.09, 'triangle', 0.09), 70); setTimeout(() => tone(1760, 0.14, 'triangle', 0.09), 140); }
  function dieSfx() { tone(320, 0.5, 'sawtooth', 0.22, { slideTo: 50 }); noiseHit(0.35, 0.2, 'highpass', 700); }

  const muteBtn = document.getElementById('mute');
  function syncMute() { muteBtn.textContent = soundOn ? '🔊' : '🔇'; }
  muteBtn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    soundOn = !soundOn;
    localStorage.setItem('neonglide-sound', soundOn ? '1' : '0');
    if (soundOn) ensureAudio();
    else if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    syncMute();
  });
  syncMute();

  // ---------- 글로벌 리더보드 (Firebase Realtime DB REST) ----------
  // LB_URL이 비어 있으면 리더보드 UI는 숨겨진다. 예: 'https://xxxx-default-rtdb.firebaseio.com/neonglide'
  const LB_URL = 'https://neon-glide-6e378-default-rtdb.firebaseio.com/neonglide';
  const lbBox = document.getElementById('lb-box');
  const lbList = document.getElementById('lb-list');
  const lbName = document.getElementById('lb-name');
  lbName.value = localStorage.getItem('ng-name') || '';
  lbName.addEventListener('pointerdown', e => e.stopPropagation());
  document.getElementById('lb-send').addEventListener('pointerdown', e => e.stopPropagation());

  async function lbTop10() {
    const r = await fetch(`${LB_URL}/scores.json?orderBy="s"&limitToLast=100`);
    if (!r.ok) throw new Error('lb fetch failed');
    const data = await r.json() || {};
    const bestByName = {};
    for (const e of Object.values(data)) {
      if (!e || typeof e.s !== 'number' || !e.n) continue;
      if (!bestByName[e.n] || e.s > bestByName[e.n].s) bestByName[e.n] = e;
    }
    return Object.values(bestByName)
      .sort((a, b) => b.s - a.s)
      .slice(0, 10);
  }
  function renderLb(rows, myName) {
    lbList.innerHTML = '';
    rows.forEach((e, i) => {
      const div = document.createElement('div');
      if (myName && e.n === myName) div.className = 'me';
      const rank = document.createElement('span'); rank.className = 'rank'; rank.textContent = (i + 1) + '.';
      const sc = document.createElement('span'); sc.className = 'sc'; sc.textContent = e.s;
      div.appendChild(rank);
      div.appendChild(document.createTextNode(String(e.n).slice(0, 12) + ' '));
      div.appendChild(sc);
      lbList.appendChild(div);
    });
    if (!rows.length) lbList.textContent = '—';
  }
  async function refreshLb() {
    if (!LB_URL) return;
    lbBox.classList.remove('hidden');
    lbList.textContent = T('loading');
    try {
      const rows = await lbTop10();
      renderLb(rows, localStorage.getItem('ng-name'));
      // 재도전 유도: TOP 10 진입 가능 여부 표시
      const hint = document.getElementById('rank-hint');
      if (score > 0) {
        if (rows.length < 10 || score > rows[rows.length - 1].s) hint.textContent = T('rankIn');
        else hint.textContent = T('rankNeed').replace('{n}', rows[9].s - score + 1);
      }
    }
    catch (_) { lbList.textContent = T('lbError'); }
  }
  let submittedThisRun = false;
  function resetSubmitUI() {
    submittedThisRun = false;
    const btn = document.getElementById('lb-send');
    btn.disabled = false;
    btn.textContent = T('submit');
    lbName.disabled = false;
  }
  document.getElementById('lb-send').addEventListener('click', async e => {
    e.stopPropagation();
    if (!LB_URL || submittedThisRun) return;
    const name = lbName.value.trim().slice(0, 12);
    if (!name || !score) return;
    localStorage.setItem('ng-name', name);
    const btn = document.getElementById('lb-send');
    btn.disabled = true;
    try {
      await fetch(`${LB_URL}/scores.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ n: name, s: score, d: dateStr, t: Date.now() })
      });
      submittedThisRun = true;                 // 한 판에 한 번만 제출 가능
      btn.textContent = T('saved');
      lbName.disabled = true;
      await refreshLb();
    } catch (_) {
      lbList.textContent = T('lbError');
      setTimeout(() => { btn.textContent = T('submit'); btn.disabled = false; }, 1500);
    }
  });

  // ---------- 입력 ----------
  function press(e) { if (state === 'play') { holding = true; e.preventDefault(); } }
  function release() { holding = false; }
  window.addEventListener('pointerdown', press);
  window.addEventListener('pointerup', release);
  window.addEventListener('pointercancel', release);
  window.addEventListener('keydown', e => { if (e.code === 'Space') { press(e); } });
  window.addEventListener('keyup', e => { if (e.code === 'Space') release(); });

  // ---------- 게임 루프 ----------
  let lastT = 0;
  function loop(t) {
    const dt = Math.min((t - lastT) / 1000, 0.033);
    lastT = t;
    if (state === 'play') update(dt);
    draw(t / 1000);
    requestAnimationFrame(loop);
  }

  function update(dt) {
    elapsed += dt;
    speed += dt * 5;                                  // 서서히 가속
    const px = W * 0.28;
    player.x = px;

    // 활공 물리: 누르면 부드럽게 상승, 떼면 하강
    const target = holding ? -370 : 370;
    player.vy += (target - player.vy) * Math.min(1, dt * 3.6);
    player.y += player.vy * dt;

    player.trail.unshift({ x: px, y: player.y });
    if (player.trail.length > 22) player.trail.pop();
    for (const p of player.trail) p.x -= speed * dt;

    // 천장/바닥 충돌
    if (player.y < 14 || player.y > H - 14) return die();

    // 게이트 이동/충돌/점수
    dist += speed * dt;
    for (const g of gates) {
      g.x -= speed * dt;
      const cy = gateCY(g);
      const halfGap = g.gapH / 2, gateW = 26;
      if (Math.abs(g.x - px) < gateW / 2 + 12) {
        if (player.y < cy - halfGap + 10 || player.y > cy + halfGap - 10) return die();
        if (g.type === 'laser' && laserOn(g)) {
          const [a, b] = laserSeg(g, cy);
          if (player.y > a && player.y < b) return die();
        }
      }
      if (!g.passed && g.x < px) {
        g.passed = true;
        gatesPassed++;
        const gain = 10 * mult;
        score += gain;
        popup(px + 24, player.y - 26, '+' + gain, g.color);
        // 아슬아슬 통과 보너스
        const edge = Math.min(player.y - (cy - halfGap), (cy + halfGap) - player.y);
        if (edge < 32) {
          const b = 5 * mult;
          score += b;
          popup(px + 24, player.y - 56, 'CLOSE! +' + b, '#ff2df7');
        }
        // 꺼진 레이저 구간을 뚫고 통과 = 스레딩 보너스
        if (g.type === 'laser') {
          const [la, lb] = laserSeg(g, cy);
          if (player.y > la && player.y < lb) {
            const b = 15 * mult;
            score += b;
            popup(px + 24, player.y - 86, 'THREAD! +' + b, '#ff2d55');
          }
        }
        // 5게이트마다 배율 상승
        if (gatesPassed % 5 === 0 && mult < 10) {
          mult++;
          popup(px, player.y - 116, '×' + mult, '#ffe14d');
          multSfx();
        }
        passSfx();
        burst(px, player.y, g.color, 14);
        updateHud();
      }
    }
    if (gates[0].x < -60) {
      gates.shift();
      const gap = gapBetween();
      const nx = gates[gates.length - 1].x + gap;
      gates.push(makeGate(nx));
      maybeCoin(nx - gap, nx);
    }

    // 별 수집
    for (const c of coins) {
      c.x -= speed * dt;
      if (!c.taken && Math.hypot(c.x - px, c.y - player.y) < 28) {
        c.taken = true;
        const gain = 25 * mult;
        score += gain;
        popup(c.x, c.y - 22, '★ +' + gain, '#ffe14d');
        if (mult < 10) {                     // 별 = 배율 부스터
          mult++;
          popup(c.x, c.y - 52, '×' + mult, '#ffe14d');
        }
        coinSfx();
        burst(c.x, c.y, '#ffe14d', 12);
        updateHud();
      }
    }
    while (coins.length && coins[0].x < -40) coins.shift();

    // 파티클
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // 점수 팝업
    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.y -= 65 * dt; p.x -= speed * dt * 0.25; p.life -= dt;
      if (p.life <= 0) popups.splice(i, 1);
    }
    if (shakeT > 0) shakeT -= dt;
  }

  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 220;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.4 + Math.random() * 0.5, color });
    }
  }

  function die() {
    state = 'over';
    dieSfx();
    shakeT = 0.35;
    burst(player.x, player.y, '#ff2d55', 40);
    const prevBest = +(localStorage.getItem(BEST_KEY) || 0);
    const isNewBest = score > prevBest && score > 0;
    const best = Math.max(score, prevBest);
    localStorage.setItem(BEST_KEY, best);
    document.getElementById('final-score').textContent = score;
    document.getElementById('best-over').textContent = `${T('best')}: ${best}`;
    document.getElementById('new-best').textContent = T('newBest');
    document.getElementById('new-best').classList.toggle('hidden', !isNewBest);
    document.getElementById('rank-hint').textContent = '';
    document.getElementById('score-live').textContent = '';
    document.getElementById('mult-badge').textContent = '';
    try { if (isNewBest && window.CrazyGames) CrazyGames.SDK.game.happytime(); } catch (_) {}
    try { if (window.CrazyGames) CrazyGames.SDK.game.gameplayStop(); } catch (_) {}
    resetSubmitUI();
    setTimeout(() => {
      document.getElementById('over-screen').classList.remove('hidden');
      refreshLb();
    }, 450);
  }

  // ---------- 렌더 ----------
  function draw(t) {
    ctx.save();
    if (shakeT > 0) ctx.translate((Math.random() - .5) * shakeT * 30, (Math.random() - .5) * shakeT * 30);

    // 배경
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0220'); bg.addColorStop(0.6, '#05010f'); bg.addColorStop(1, '#120432');
    ctx.fillStyle = bg;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // 별 (패럴랙스)
    const scroll = state === 'play' ? dist : t * 40;
    for (const s of stars) {
      const x = ((s.x * W - scroll * s.depth) % (W * 1.2) + W * 1.2) % (W * 1.2) - W * 0.1;
      const a = 0.35 + 0.5 * Math.abs(Math.sin(t * 1.5 + s.tw));
      ctx.globalAlpha = a * s.depth * 1.6;
      ctx.fillStyle = '#cfeaff';
      ctx.beginPath(); ctx.arc(x, s.y * H, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 그리드 바닥 (신스웨이브 느낌)
    ctx.strokeStyle = 'rgba(106, 91, 255, 0.22)';
    ctx.lineWidth = 1;
    const gridOff = (scroll * 0.6) % 70;
    for (let x = -gridOff; x < W; x += 70) {
      ctx.beginPath(); ctx.moveTo(x, H * 0.82); ctx.lineTo(x - 90, H); ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const y = H * 0.82 + (H * 0.18) * (i / 4) ** 1.6;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 게이트 (글로우는 shadowBlur 대신 저비용 반투명 레이어)
    if (state !== 'idle') {
      for (const g of gates) {
        if (g.x < -40 || g.x > W + 40) continue;
        const cy = gateCY(g);
        const half = g.gapH / 2;
        const pulse = 0.75 + 0.25 * Math.sin(t * 5 + g.pulse);
        const topH = cy - half + 10;
        const botY = cy + half;
        ctx.fillStyle = g.color;
        ctx.globalAlpha = 0.13 * pulse;
        roundRect(g.x - 17, -10, 34, topH, 12);
        roundRect(g.x - 17, botY, 34, H - botY + 10, 12);
        ctx.globalAlpha = 0.3 * pulse;
        roundRect(g.x - 12, -10, 24, topH, 10);
        roundRect(g.x - 12, botY, 24, H - botY + 10, 10);
        ctx.globalAlpha = 1;
        roundRect(g.x - 8, -10, 16, topH, 8);
        roundRect(g.x - 8, botY, 16, H - botY + 10, 8);
        // 게이트 끝 캡
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.25;
        ctx.beginPath(); ctx.arc(g.x, cy - half, 9 * pulse + 3, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(g.x, cy + half, 9 * pulse + 3, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.arc(g.x, cy - half, 5 * pulse + 2, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(g.x, cy + half, 5 * pulse + 2, 0, 7); ctx.fill();
        // 부분 레이저: 켜지면 붉게, 켜지기 직전엔 흐릿한 예고 (통로는 항상 열려 있음)
        if (g.type === 'laser') {
          const on = laserOn(g), warn = laserWarn(g);
          if (on || warn) {
            const [a, b] = laserSeg(g, cy);
            ctx.strokeStyle = '#ff2d55';
            if (on) {
              const flick = 0.75 + 0.25 * Math.sin(t * 40);
              ctx.globalAlpha = 0.25 * flick;
              ctx.lineWidth = 11;
              ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
              ctx.globalAlpha = flick;
              ctx.lineWidth = 4;
              ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
              ctx.strokeStyle = '#ffd7de';
              ctx.globalAlpha = 0.9;
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
              // 레이저 발생기 노드
              ctx.fillStyle = '#ff2d55';
              ctx.beginPath(); ctx.arc(g.x, g.segTop ? a : b, 6, 0, 7); ctx.fill();
            } else {
              ctx.globalAlpha = 0.22;
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
            }
            ctx.globalAlpha = 1;
          }
        }
      }

      // 별
      for (const c of coins) {
        if (c.taken || c.x < -30 || c.x > W + 30) continue;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.fillStyle = '#ffe14d';
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(0, 0, 17, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.rotate(t * 2 + c.spin);
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i % 2 ? 4.5 : 10, a = i * Math.PI / 5 - Math.PI / 2;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // 파티클
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life * 1.6);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 점수 팝업
    if (popups.length) {
      ctx.font = '800 19px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      for (const p of popups) {
        ctx.globalAlpha = Math.min(1, p.life * 1.8);
        ctx.fillStyle = p.color;
        ctx.fillText(p.txt, p.x, p.y);
      }
      ctx.globalAlpha = 1;
      ctx.textAlign = 'start';
    }

    // 플레이어 + 트레일
    if (state === 'play' || (state === 'over' && shakeT > 0)) {
      const fever = mult >= 5;
      for (let i = player.trail.length - 1; i > 0; i--) {
        const p = player.trail[i];
        ctx.globalAlpha = (1 - i / player.trail.length) * 0.5;
        ctx.fillStyle = fever ? `hsl(${(t * 400 + i * 26) % 360}, 100%, 62%)` : '#00f0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 8 * (1 - i / player.trail.length) + 1, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (state === 'play') {
        const tilt = Math.max(-0.5, Math.min(0.5, player.vy / 700));
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(tilt);
        ctx.fillStyle = '#00f0ff';
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, 7); ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(2, 0, 13, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#eafcff';
        ctx.beginPath();
        ctx.moveTo(16, 0); ctx.lineTo(-12, -9); ctx.lineTo(-6, 0); ctx.lineTo(-12, 9);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, Math.max(h, 0), r);
    ctx.fill();
  }

  // ---------- UI ----------
  const startScreen = document.getElementById('start-screen');
  const overScreen = document.getElementById('over-screen');
  applyLang();

  function startGame() {
    ensureAudio();
    reset();
    state = 'play';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    updateHud();
    try { if (window.CrazyGames) CrazyGames.SDK.game.gameplayStart(); } catch (_) {}
  }
  document.getElementById('btn-start').addEventListener('click', e => { e.stopPropagation(); startGame(); });
  document.getElementById('btn-retry').addEventListener('click', e => { e.stopPropagation(); startGame(); });

  // ---------- 점수 공유 ----------
  document.getElementById('btn-share').addEventListener('click', async e => {
    e.stopPropagation();
    const text = T('shareText').replace('{date}', dateStr).replace('{score}', score).replace('{url}', 'https://csj3814-create.github.io/neon-glide/');
    try {
      if (navigator.share) {
        await navigator.share({ text });
      } else {
        await navigator.clipboard.writeText(text);
        toast(T('copied'));
      }
    } catch (_) { /* 사용자가 공유 취소 */ }
  });

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
})();
</script>
</body>
</html>
