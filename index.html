    border-radius: 8px;
    color: #fff;
    padding: 8px 10px;
    font-size: 14px;
    outline: none;
  }

  #over-left { display: flex; flex-direction: column; align-items: center; gap: 13px; }

  function seededStars(seedRng) {

  function reset() {

  }

  function gapBetween() { return 340 + rng() * 220; }

  // 게이트 = 1~3개의 열린 통로(gaps)를 가진 기둥 벽
  function makeGate(x, gapDist) {
    const margin = 70;
    const gp = gatesPassed;
    // 통로 개수: 진행할수록 다중 통로 확률 상승
    let nGaps = 1;
    if (gp >= 3) {
      const r = rng();
      nGaps = r < 0.55 ? 1 : (r < 0.88 ? 2 : 3);
    }
    const baseHalf = Math.max(160, 340 - gp * 6) / 2 * (nGaps > 1 ? 0.82 : 1);
    // 도달 가능성: 이전 기준점에서 물리적으로 갈 수 있는 범위 안에 통로 하나는 보장
    const reach = Math.max(150, (gapDist / Math.max(120, speed)) * 370 * 0.7);
    // 통로 배치: 화면을 밴드로 나눠 겹침 없이 배치
    const usable = H - margin * 2;
    const centers = [];
    for (let i = 0; i < nGaps; i++) {
      const band = usable / nGaps;
      centers.push(margin + band * i + band * (0.3 + rng() * 0.4));
    }
    // 가장 가까운 통로를 도달 가능 범위로 보정
    let bi = 0;
    for (let i = 1; i < nGaps; i++) if (Math.abs(centers[i] - anchorY) < Math.abs(centers[bi] - anchorY)) bi = i;
    centers[bi] = Math.max(margin + baseHalf, Math.min(H - margin - baseHalf,
      Math.max(anchorY - reach, Math.min(anchorY + reach, centers[bi]))));
    const gaps = centers.map(cy => ({
      cy,
      half: baseHalf * (0.85 + rng() * 0.3),
      laser: null,
      segTop: rng() < 0.5
    }));
    const g = {
      x, gaps,
      idx: ++gateSeq,
      color: NEONS[(rng() * NEONS.length) | 0],
      passed: false,
      pulse: rng() * Math.PI * 2,
      amp: 0, phase: rng() * Math.PI * 2,
      pulseAmp: 0
    };
    // 무버: 게이트 전체가 상하로 출렁임
    if (gp >= 4 && rng() < 0.33) g.amp = 40 + Math.min(80, gp * 3);
    // 펄스: 통로 폭이 숨쉬듯 변함
    if (gp >= 6 && rng() < 0.3) g.pulseAmp = 0.10 + rng() * 0.10;
    // 레이저: 다중 통로면 한 통로를 통째로 (다른 통로는 항상 열림),
    //          단일 통로면 틈의 55%만 (부분 차단) — 브레이크로 타이밍 조절 가능
    if (nGaps >= 2 && gp >= 6 && rng() < 0.45) {
      gaps[(rng() * nGaps) | 0].laser = { full: true, pulse: rng() * Math.PI * 2 };
    } else if (nGaps === 1 && gp >= 8 && rng() < 0.3) {
      gaps[0].laser = { full: false, pulse: rng() * Math.PI * 2 };
    }
    // 다음 게이트 기준점 = 보정한 도달 가능 통로
    anchorY = gaps[bi].cy;
    return g;
  }

  function maybeCoin(fromX, toX) {
    const r = rng();
    if (r < 0.14) {
      // 스타 러시: 곡선을 그리는 별 5개 (젯팩 조이라이드 코인 패턴)
      const y0 = 110 + rng() * (H - 220);
      const amp = 40 + rng() * 70;
      const x0 = fromX + (toX - fromX) * 0.2;
      const dir = rng() < 0.5 ? 1 : -1;
      for (let i = 0; i < 5; i++) {
        coins.push({
          x: x0 + i * 44,
          y: Math.max(60, Math.min(H - 60, y0 + Math.sin(i * 0.8) * amp * dir)),
          taken: false,
          spin: rng() * 7
        });
      }
    } else if (r < 0.58) {
      coins.push({
        x: fromX + (toX - fromX) * (0.35 + rng() * 0.3),
        y: 80 + rng() * (H - 160),
        taken: false,
        spin: rng() * 7
      });
    }
  }

  // 무버 게이트의 현재 상하 오프셋 (모든 통로가 함께 이동, 화면 밖 이탈 방지)
  function gateDY(g) {
    if (!g.amp) return 0;
    const dy = Math.sin(elapsed * 2.2 + g.phase) * g.amp;
    let minC = Infinity, maxC = -Infinity;
    for (const gp2 of g.gaps) {
      minC = Math.min(minC, gp2.cy - gp2.half);
      maxC = Math.max(maxC, gp2.cy + gp2.half);
    }
    return Math.max(40 - minC, Math.min(H - 40 - maxC, dy));
  }
  // 펄스 게이트의 현재 통로 반높이
  function gapHalf(g, gp2) {
    if (!g.pulseAmp) return gp2.half;
    return gp2.half * (1 + g.pulseAmp * Math.sin(elapsed * 2.6 + g.pulse));
  }
  const LASER_FRAC = 0.55;
  function laserSeg(gp2, cy, half) {
    if (gp2.laser.full) return [cy - half, cy + half];
    const segLen = half * 2 * LASER_FRAC;
    return gp2.segTop ? [cy - half, cy - half + segLen] : [cy + half - segLen, cy + half];
  }
  function laserPhase(l) { return (elapsed + l.pulse) % 1.6; }
  function laserOn(l) { return laserPhase(l) < 0.7; }
  function laserWarn(l) { return laserPhase(l) > 1.35; }

  // ---------- 사운드 (WebAudio 펑키 일렉트로, 외부 파일 없음) ----------
  let ac = null, master = null, delaySend = null, musicTimer = null, musicStep = 0;
  // 기본값 = 음소거 (사용자가 명시적으로 켠 경우에만 소리)
  let soundOn = localStorage.getItem('neonglide-sound') === '1';

  function ensureAudio() {
    if (!soundOn) return;
    if (!ac) {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createDynamicsCompressor();
      master.threshold.value = -18;
      master.ratio.value = 5;
      master.connect(ac.destination);
      const dly = ac.createDelay(1);
      dly.delayTime.value = 0.2381;                  // 16분음표 2개 (126BPM)
      const fb = ac.createGain(); fb.gain.value = 0.35;
      const wet = ac.createGain(); wet.gain.value = 0.45;
      dly.connect(fb); fb.connect(dly);
      dly.connect(wet); wet.connect(master);
      delaySend = dly;
    }
    if (ac.state === 'suspended') ac.resume();
    if (!musicTimer) musicTimer = setInterval(musicTick, 119);   // 126BPM 16분음표
  }
  function tone(freq, dur, type, vol, opts) {
    if (!ac || !soundOn) return;
    opts = opts || {};
    const o = ac.createOscillator(), g = ac.createGain(), t0 = ac.currentTime;
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(opts.slideTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    let node = o;
    if (opts.lp) {
      const f = ac.createBiquadFilter();
      f.type = 'lowpass'; f.Q.value = opts.q || 1;
      f.frequency.setValueAtTime(opts.lp, t0);
      if (opts.lpEnd) f.frequency.exponentialRampToValueAtTime(opts.lpEnd, t0 + dur);
      o.connect(f); node = f;
    }
    node.connect(g);
    g.connect(opts.echo ? delaySend : master);
    if (opts.echo) g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noiseHit(dur, vol, fType, fFreq, q) {
    if (!ac || !soundOn) return;
    const len = (ac.sampleRate * dur) | 0;
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = fType; f.frequency.value = fFreq; f.Q.value = q || 1;

    src.connect(f); f.connect(g); g.connect(master);

  // 32스텝(2마디) 펑키 그루브 — A마이너
  const BASS = { 0:[55,.24], 3:[55,.1], 6:[110,.1], 8:[82.41,.22], 11:[55,.1], 14:[98,.12], 16:[55,.24], 19:[55,.1], 22:[110,.1], 24:[87.31,.22], 27:[65.41,.1], 30:[73.42,.12] };
  const LEAD = { 0:440, 2:523.25, 4:587.33, 6:659.25, 10:523.25, 12:440, 16:659.25, 18:783.99, 20:880, 24:659.25, 26:587.33, 28:523.25 };
  const STAB = { 6:[220,261.63,329.63,392], 22:[196,246.94,293.66,349.23] };
  function musicTick() {
    if (!ac || !soundOn) return;
    const s = musicStep % 32;
    // 진행도에 따라 음악이 4단계로 진화 (0: 인트로, 1: 5게이트~, 2: 15게이트~, 3: 30게이트~)

  // ---------- 글로벌 리더보드 (Firebase Realtime DB REST) ----------
  // LB_URL이 비어 있으면 리더보드 UI는 숨겨진다. 예: 'https://xxxx-default-rtdb.firebaseio.com/neonglide'
  const LB_URL = 'https://neon-glide-6e378-default-rtdb.firebaseio.com/neonglide';
  const lbBox = document.getElementById('lb-box');
  const lbList = document.getElementById('lb-list');
  const lbName = document.getElementById('lb-name');

  // 일별 리더보드 (UTC 날짜 기준) + 과거 기록 탐색 + 로컬 캐시
  let lbDate = dateStr;
  function shiftLbDate(days) {
    const d = new Date(lbDate + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + days);
    const nd = d.toISOString().slice(0, 10);
    if (nd > dateStr) return;

    refreshLb();
  }
  // 전 세계 전체 순위 리스트 (해당 UTC 날짜, 이름별 최고 기록, 내림차순)
  async function lbAll(date) {
    const r = await fetch(`${LB_URL}/scores.json?orderBy="s"&limitToLast=500`);
    if (!r.ok) throw new Error('lb fetch failed');
    const data = await r.json() || {};
    const bestByName = {};
    for (const e of Object.values(data)) {
      if (!e || typeof e.s !== 'number' || !e.n || e.d !== date) continue;
      if (!bestByName[e.n] || e.s > bestByName[e.n].s) bestByName[e.n] = e;
    }
    return Object.values(bestByName)
      .sort((a, b) => b.s - a.s)
      .slice(0, 150);
  }
  function renderLb(rows, myName) {
    lbList.innerHTML = '';

      const div = document.createElement('div');
      const cls = [];
      if (myName && e.n === myName) cls.push('me');
      if (i === 0) cls.push('r1'); else if (i === 1) cls.push('r2'); else if (i === 2) cls.push('r3');
      div.className = cls.join(' ');
      const rank = document.createElement('span'); rank.className = 'rank';
      rank.textContent = i === 0 ? '👑' : (i + 1) + '.';
      const sc = document.createElement('span'); sc.className = 'sc'; sc.textContent = e.s;
      div.appendChild(rank);
      div.appendChild(document.createTextNode(String(e.n).slice(0, 12) + ' '));
      div.appendChild(sc);
      if (!myRow && myName && e.n === myName) myRow = div;
      lbList.appendChild(div);
    });
    if (!rows.length) lbList.textContent = '—';
    // 기본은 1~10위, 내가 그 아래면 잠시 후 내 위치로 주루룩 스크롤

  async function refreshLb() {

  // ---------- 입력 ----------
  // 터치 존: 오른쪽 절반 = 상승(UP) · 왼쪽 위 = 가속 · 왼쪽 아래 = 감속
  // 마우스: 좌클릭 어디서나 = 상승 · 우클릭 = 감속 (데스크톱)
  const ptrZone = new Map();
  function zoneOf(e) {
    const gx = rotated ? e.clientY : e.clientX;            // 게임 가로축 좌표
    const gy = rotated ? (cssH - e.clientX) : e.clientY;   // 게임 세로축 좌표
    if (gx > cssW / 2) return 'rise';                      // 오른쪽 절반 = 상승
    return gy < cssH / 2 ? 'boost' : 'brake';              // 왼쪽 위 = 가속, 아래 = 감속
  }
  function recomputeTouch() {
    let rise = false, boost = false, brake = false;
    for (const z of ptrZone.values()) {

    }
    holding = rise; touchBoost = boost; touchBrake = brake;
  }
  function press(e) {

    if (e.pointerType === 'mouse') {
      if (e.button === 0) holding = true;                  // 좌클릭 = 상승
      e.preventDefault(); return;
    }
    ptrZone.set(e.pointerId, zoneOf(e));
    recomputeTouch();
    e.preventDefault();
  }
  function move(e) {
    if (e.pointerType === 'mouse') return;
    if (ptrZone.has(e.pointerId)) { ptrZone.set(e.pointerId, zoneOf(e)); recomputeTouch(); }
  }
  function release(e) {
    if (e && e.pointerType === 'mouse') { holding = false; return; }
    if (e) ptrZone.delete(e.pointerId);

  }

  window.addEventListener('pointermove', move);

  // ---------- 게임 루프 ----------

  function update(dt) {

    const px = W * 0.28;
    player.x = px;

    // 활공 물리: 누르면 부드럽게 상승, 떼면 하강
    const target = holding ? -370 : 370;
    player.vy += (target - player.vy) * Math.min(1, dt * 3.6);
    player.y += player.vy * dt;

    player.trail.unshift({ x: px, y: player.y });
    const trailMax = mult >= 10 ? 46 : (mult >= 5 ? 30 : 22);   // MAX 모드에서 꼬리가 확 길어짐
    while (player.trail.length > trailMax) player.trail.pop();
    for (const p of player.trail) p.x -= spd * dt;
    // MAX 모드(×10): 반짝이 스파클을 흩뿌림
    if (mult >= 10 && Math.random() < 0.6) {
      const a = Math.random() * Math.PI * 2;

    }

    // 게이트 이동/충돌/점수
    dist += spd * dt;
    for (const g of gates) {
      g.x -= spd * dt;
      const gateW = 26;
      if (Math.abs(g.x - px) < gateW / 2 + 12) {
        const dy = gateDY(g);
        let inGap = null;
        for (const gp2 of g.gaps) {
          const half = gapHalf(g, gp2), c = gp2.cy + dy;
          if (player.y > c - half + 10 && player.y < c + half - 10) { inGap = { gp: gp2, c, half }; break; }
        }
        if (!inGap) return die();
        if (inGap.gp.laser && laserOn(inGap.gp.laser)) {
          const [la, lb] = laserSeg(inGap.gp, inGap.c, inGap.half);
          if (player.y > la && player.y < lb) return die();
        }
      }
      if (!g.passed && g.x < px) {
        g.passed = true;
        gatesPassed++;
        const gain = 10 * mult;

        popup(px + 24, player.y - 26, '+' + gain, g.color);
        // 통과한 통로 기준 스킬 보너스
        const dy2 = gateDY(g);
        let th = null;
        for (const gp2 of g.gaps) {
          const half = gapHalf(g, gp2), c = gp2.cy + dy2;
          if (player.y > c - half && player.y < c + half) { th = { gp: gp2, c, half }; break; }
        }
        if (th) {
          const edge = Math.min(player.y - (th.c - th.half), (th.c + th.half) - player.y);
          if (edge < 32) {
            const b = 5 * mult;
            score += b;
            popup(px + 24, player.y - 56, 'CLOSE! +' + b, '#ff2df7');
          }
          // 꺼진 레이저 구간을 뚫고 통과 = 스레딩 보너스

            if (player.y > la && player.y < lb) {
              const b = 15 * mult;
              score += b;
              popup(px + 24, player.y - 86, 'THREAD! +' + b, '#ff2d55');
            }

        }
        // 부스트 상태로 통과 = 배짱 보너스

        // 5게이트마다 배율 상승
        if (gatesPassed % 5 === 0 && mult < 10) {

    }
    if (gates[0].x < -60) {

    // 별 수집

      c.x -= spd * dt;
      if (!c.taken && Math.hypot(c.x - px, c.y - player.y) < 28) {
        c.taken = true;

        }
        coinSfx();
        burst(c.x, c.y, '#ffe14d', 12);
        updateHud();
      }
    }
    while (coins.length && coins[0].x < -40) coins.shift();

    // 파티클
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // 점수 팝업
    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.y -= 65 * dt; p.x -= speed * speedF * dt * 0.25; p.life -= dt;
      if (p.life <= 0) popups.splice(i, 1);
    }
    if (shakeT > 0) shakeT -= dt;
  }

  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 220;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.4 + Math.random() * 0.5, color });
    }
  }

  function die() {
    state = 'over';
    dieSfx();
    shakeT = 0.35;
    burst(player.x, player.y, '#ff2d55', 40);
    document.getElementById('score-live').textContent = '';
    document.getElementById('mult-badge').textContent = '';
    document.getElementById('gate-badge').textContent = '';
    // 무료 이어하기 1회 (3게이트 이상 진행 시)
    if (!reviveUsed && gatesPassed >= 3) {
      setTimeout(showRevive, 450);
      return;
    }
    finishOver();
  }

  function showRevive() {
    const rs = document.getElementById('revive-screen');
    rs.classList.remove('hidden');
    let n = 3;
    document.getElementById('revive-count').textContent = n;
    reviveTimer = setInterval(() => {
      n--;
      if (n <= 0) {
        clearInterval(reviveTimer);
        rs.classList.add('hidden');
        finishOver();
      } else {
        document.getElementById('revive-count').textContent = n;
      }
    }, 1000);
  }

  function doRevive() {
    clearInterval(reviveTimer);
    document.getElementById('revive-screen').classList.add('hidden');
    reviveUsed = true;
    // 전방 코스를 새로 깔고 안전한 위치에서 재개
    gates = []; coins = []; popups = [];
    player.y = H / 2; player.vy = 0;
    player.trail = [];
    anchorY = H / 2;
    let gx = W + 300, prevGap = 420;
    for (let i = 0; i < 6; i++) {
      gates.push(makeGate(gx, prevGap));
      const gap = gapBetween();
      maybeCoin(gx, gx + gap);
      gx += gap;
      prevGap = gap;
    }
    holding = false; keyThrottle = 0; mouseBrake = false; touchBrake = false; touchBoost = false;
    energy = 100;
    state = 'play';
    updateHud();
  }

  function finishOver() {
    const prevBest = +(localStorage.getItem(BEST_KEY) || 0);
    const isNewBest = score > prevBest && score > 0;
    const best = Math.max(score, prevBest);
    localStorage.setItem(BEST_KEY, best);
    if (gatesPassed > bestG) {
      bestG = gatesPassed;
      localStorage.setItem(BESTG_KEY, bestG);
    }
    lastRun = { best, gatesPassed, isNewBest };
    document.getElementById('final-score').textContent = score;
    document.getElementById('best-over').textContent = `${T('best')}: ${best}`;
    document.getElementById('reached-line').textContent = T('reached').replace('{n}', gatesPassed);
    document.getElementById('new-best').textContent = T('newBest');
    document.getElementById('new-best').classList.toggle('hidden', !isNewBest);
    document.getElementById('rank-hint').textContent = '';
    try { if (isNewBest && window.CrazyGames) CrazyGames.SDK.game.happytime(); } catch (_) {}
    try { if (window.CrazyGames) CrazyGames.SDK.game.gameplayStop(); } catch (_) {}
    resetSubmitUI();
    lbDate = dateStr;    // 게임오버 시엔 항상 오늘 보드부터
    setTimeout(() => {
      document.getElementById('over-screen').classList.remove('hidden');
      refreshLb().then(autoSubmit);   // 리더보드 표시 후 자동 등록 → 내 기록 강조
    }, 450);
  }

  // ---------- 렌더 ----------
  function draw(t) {
    // 1) 디바이스 전체를 그라데이션 + 앰비언트 별로 채워 레터박스(검은 여백)를 자연스럽게
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    const dbg = ctx.createLinearGradient(0, 0, 0, cssH);
    dbg.addColorStop(0, '#0a0220'); dbg.addColorStop(0.6, '#05010f'); dbg.addColorStop(1, '#120432');
    ctx.fillStyle = dbg;
    ctx.fillRect(0, 0, cssW, cssH);
    const scroll0 = state === 'play' ? dist : t * 40;
    ctx.fillStyle = '#cfeaff';
    for (const s of stars) {
      const x = ((s.x * cssW - scroll0 * s.depth * 0.5) % (cssW * 1.2) + cssW * 1.2) % (cssW * 1.2) - cssW * 0.1;
      ctx.globalAlpha = (0.2 + 0.35 * Math.abs(Math.sin(t * 1.5 + s.tw))) * s.depth;
      ctx.beginPath(); ctx.arc(x, s.y * cssH, s.r * 0.8, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 2) 가상 해상도 변환 적용 (플레이 필드를 화면 중앙에 스케일)
    ctx.setTransform(DPR * vscale, 0, 0, DPR * vscale, DPR * voffX, DPR * voffY);
    ctx.save();
    if (shakeT > 0) ctx.translate((Math.random() - .5) * shakeT * 30, (Math.random() - .5) * shakeT * 30);

    // 배경
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0220'); bg.addColorStop(0.6, '#05010f'); bg.addColorStop(1, '#120432');
    ctx.fillStyle = bg;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // 별 (패럴랙스)
    const scroll = state === 'play' ? dist : t * 40;
    for (const s of stars) {
      const x = ((s.x * W - scroll * s.depth) % (W * 1.2) + W * 1.2) % (W * 1.2) - W * 0.1;
      const a = 0.35 + 0.5 * Math.abs(Math.sin(t * 1.5 + s.tw));
      ctx.globalAlpha = a * s.depth * 1.6;
      ctx.fillStyle = '#cfeaff';
      ctx.beginPath(); ctx.arc(x, s.y * H, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 그리드 바닥 (신스웨이브 느낌)
    ctx.strokeStyle = 'rgba(106, 91, 255, 0.22)';
    ctx.lineWidth = 1;
    const gridOff = (scroll * 0.6) % 70;
    for (let x = -gridOff; x < W; x += 70) {
      ctx.beginPath(); ctx.moveTo(x, H * 0.82); ctx.lineTo(x - 90, H); ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const y = H * 0.82 + (H * 0.18) * (i / 4) ** 1.6;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 게이트 (글로우는 shadowBlur 대신 저비용 반투명 레이어)
    if (state !== 'idle') {
      for (const g of gates) {
        if (g.x < -40 || g.x > W + 40) continue;
        const dy = gateDY(g);
        const pulse = 0.75 + 0.25 * Math.sin(t * 5 + g.pulse);
        // 통로들을 위에서 아래로 정렬해 기둥 구간 계산
        const sorted = g.gaps.map(gp2 => {
          const half = gapHalf(g, gp2);
          return { top: gp2.cy + dy - half, bot: gp2.cy + dy + half, gp: gp2, half };
        }).sort((a, b) => a.top - b.top);
        const segs = [];   // 기둥(막힌) 구간들
        let cur = -10;
        for (const s of sorted) { segs.push([cur, s.top]); cur = s.bot; }
        segs.push([cur, H + 10]);
        ctx.fillStyle = g.color;
        for (const [y0, y1] of segs) {
          const hgt = y1 - y0;
          if (hgt <= 0) continue;
          ctx.globalAlpha = 0.13 * pulse;
          roundRect(g.x - 17, y0, 34, hgt, 12);
          ctx.globalAlpha = 0.3 * pulse;
          roundRect(g.x - 12, y0, 24, hgt, 10);
          ctx.globalAlpha = 1;
          roundRect(g.x - 8, y0, 16, hgt, 8);
        }
        // 통로 양 끝 캡
        ctx.fillStyle = '#fff';
        for (const s of sorted) {
          ctx.globalAlpha = 0.25;
          ctx.beginPath(); ctx.arc(g.x, s.top, 9 * pulse + 3, 0, 7); ctx.fill();
          ctx.beginPath(); ctx.arc(g.x, s.bot, 9 * pulse + 3, 0, 7); ctx.fill();
          ctx.globalAlpha = 1;
          ctx.beginPath(); ctx.arc(g.x, s.top, 5 * pulse + 2, 0, 7); ctx.fill();
          ctx.beginPath(); ctx.arc(g.x, s.bot, 5 * pulse + 2, 0, 7); ctx.fill();
        }
        // 게이트 번호 (크고 잘 보이게) + BEST 깃발
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 번호 배경 알약
        ctx.fillStyle = 'rgba(5,1,15,0.55)';
        const numStr = '' + g.idx, numW = 20 + numStr.length * 15;
        roundRect(g.x - numW / 2, 8, numW, 34, 10);
        ctx.fillStyle = g.color;
        ctx.font = '800 26px "Segoe UI", sans-serif';
        ctx.fillText(numStr, g.x, 26);
        if (bestG > 0 && g.idx === bestG + 1) {
          ctx.fillStyle = '#ffe14d';
          ctx.font = '800 16px "Segoe UI", sans-serif';
          ctx.fillText('★ BEST', g.x, 56);
        }
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
        // 레이저: 켜지면 붉게, 켜지기 직전엔 흐릿한 예고
        for (const s of sorted) {
          if (!s.gp.laser) continue;
          const on = laserOn(s.gp.laser), warn = laserWarn(s.gp.laser);
          if (!on && !warn) continue;
          const c2 = s.gp.cy + dy;
          const [a, b] = laserSeg(s.gp, c2, s.half);
          ctx.strokeStyle = '#ff2d55';
          if (on) {
            const flick = 0.75 + 0.25 * Math.sin(t * 40);
            ctx.globalAlpha = 0.25 * flick;
            ctx.lineWidth = 11;
            ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
            ctx.globalAlpha = flick;
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
            ctx.strokeStyle = '#ffd7de';
            ctx.globalAlpha = 0.9;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
            ctx.fillStyle = '#ff2d55';
            ctx.beginPath(); ctx.arc(g.x, s.gp.laser.full ? a : (s.gp.segTop ? a : b), 6, 0, 7); ctx.fill();
            ctx.fillStyle = '#fff';
          } else {
            ctx.globalAlpha = 0.22;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(g.x, a + 2); ctx.lineTo(g.x, b - 2); ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
      }

      // 별
      for (const c of coins) {
        if (c.taken || c.x < -30 || c.x > W + 30) continue;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.fillStyle = '#ffe14d';
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(0, 0, 17, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.rotate(t * 2 + c.spin);
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i % 2 ? 4.5 : 10, a = i * Math.PI / 5 - Math.PI / 2;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // 파티클
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life * 1.6);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 점수 팝업
    if (popups.length) {
      ctx.font = '800 19px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      for (const p of popups) {
        ctx.globalAlpha = Math.min(1, p.life * 1.8);
        ctx.fillStyle = p.color;
        ctx.fillText(p.txt, p.x, p.y);
      }
      ctx.globalAlpha = 1;
      ctx.textAlign = 'start';
    }

    // 플레이어 + 트레일
    if (state === 'play' || state === 'paused' || (state === 'over' && shakeT > 0)) {
      const fever = mult >= 5, maxMode = mult >= 10;
      const tlen = player.trail.length;
      for (let i = tlen - 1; i > 0; i--) {
        const p = player.trail[i];
        const f = 1 - i / tlen;
        ctx.globalAlpha = f * (maxMode ? 0.8 : 0.5);
        ctx.fillStyle = fever ? `hsl(${(t * 400 + i * 26) % 360}, 100%, ${maxMode ? 66 : 62}%)` : '#00f0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, (maxMode ? 12 : 8) * f + 1, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
      // MAX 모드: 기체 주변 무지개 오라
      if (maxMode && (state === 'play' || state === 'paused')) {
        for (let k = 0; k < 3; k++) {
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = `hsl(${(t * 400 + k * 120) % 360},100%,65%)`;
          ctx.beginPath(); ctx.arc(player.x, player.y, 26 + k * 8 + Math.sin(t * 8 + k) * 4, 0, 7); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      if (state === 'play' || state === 'paused') {
        const tilt = Math.max(-0.5, Math.min(0.5, player.vy / 700));
        // 에너지 부족 시 기체가 빨갛게 점멸 (25% 이하)
        const lowE = state === 'play' && energy < 25;
        const flash = lowE ? (0.5 + 0.5 * Math.sin(t * 18)) : 0;
        const haloColor = lowE ? '#ff2d55' : '#00f0ff';
        const bodyColor = lowE ? `rgb(255,${Math.round(215 - 120 * flash)},${Math.round(220 - 150 * flash)})` : '#eafcff';
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(tilt);
        ctx.fillStyle = haloColor;
        ctx.globalAlpha = 0.2 + 0.25 * flash;
        ctx.beginPath(); ctx.arc(0, 0, 22 + 6 * flash, 0, 7); ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(2, 0, 13, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.moveTo(16, 0); ctx.lineTo(-12, -9); ctx.lineTo(-6, 0); ctx.lineTo(-12, 9);
        ctx.closePath(); ctx.fill();
        // 부스트 화염
        if (speedF > 1.15) {
          const fl = 16 + Math.random() * 12;
          ctx.fillStyle = '#39ff88';
          ctx.globalAlpha = 0.85;
          ctx.beginPath();
          ctx.moveTo(-11, -5); ctx.lineTo(-11 - fl, 0); ctx.lineTo(-11, 5);
          ctx.closePath(); ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }
    }
    ctx.restore();

    // 에너지 바 + 비행거리 (우주 스케일)
    if (state === 'play' || state === 'paused') {
      const bw = 200, bx = (W - bw) / 2, by = H - 30;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(bx, by, bw, 8);
      ctx.fillStyle = energy < 25 ? '#ff2d55' : (speedF > 1.15 ? '#39ff88' : '#00f0ff');
      ctx.fillRect(bx, by, bw * (energy / 100), 8);
      ctx.textAlign = 'center';
      ctx.font = '700 13px "Segoe UI", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText('⚡', bx - 14, by + 8);
      ctx.font = '700 15px "Segoe UI", sans-serif';
      ctx.fillStyle = '#9fd8ff';
      ctx.fillText('🛸 ' + Math.floor(dist / 10).toLocaleString() + ' km', W / 2, 66);
      ctx.textAlign = 'start';
    }
    // 일시정지 오버레이
    if (state === 'paused') {
      ctx.fillStyle = 'rgba(5,1,15,0.55)';
      ctx.fillRect(-4000, -4000, W + 8000, H + 8000);
      ctx.textAlign = 'center';
      ctx.font = '800 42px "Segoe UI", sans-serif';
      ctx.fillStyle = '#bffaff';
      ctx.fillText('⏸ PAUSED', W / 2, H / 2);
      ctx.font = '600 18px "Segoe UI", sans-serif';
      ctx.fillStyle = '#7ff5ff';
      ctx.fillText('▶ tap to resume', W / 2, H / 2 + 38);
      ctx.textAlign = 'start';
    }

    // 속도감 스피드라인 (전체 화면, 디바이스 좌표) — 선 개수·길이·밝기로 빠르고 느림을 체감
    if (state === 'play') {
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      const boost = speedF > 1.12, brake = speedF < 0.9;
      const nLines = boost ? 30 : (brake ? 4 : 13);
      const col = boost ? '#5bff9d' : (brake ? '#6f9dff' : '#cfe8ff');
      ctx.strokeStyle = col; ctx.lineCap = 'round';
      for (let i = 0; i < nLines; i++) {
        const y = Math.random() * cssH;
        const x0 = Math.random() * cssW;
        const len = boost ? (140 + Math.random() * 220) : (brake ? (14 + Math.random() * 26) : (60 + Math.random() * 110));
        ctx.globalAlpha = (boost ? 0.45 : brake ? 0.3 : 0.22) * (0.55 + Math.random() * 0.45);
        ctx.lineWidth = boost ? 3 : (brake ? 2.5 : 1.8);
        ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 - len, y); ctx.stroke();
      }
      ctx.globalAlpha = 1; ctx.lineCap = 'butt';
    }

    // 터치 존 안내 (터치 기기, 게임 초반 몇 초간 크게 표시 후 페이드) — 디바이스 좌표
    if (state === 'play' && isTouch && elapsed < 6.5) {
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      const fade = elapsed > 4.5 ? Math.max(0, (6.5 - elapsed) / 2) : 1;
      const R = Math.min(cssW, cssH) * 0.13;             // 버튼 크기
      const zones = [
        [cssW * 0.25, cssH * 0.27, '⏩', 'BOOST', '#39ff88'],   // 왼쪽 위 = 가속
        [cssW * 0.25, cssH * 0.73, '⏪', 'BRAKE', '#00f0ff'],   // 왼쪽 아래 = 감속
        [cssW * 0.75, cssH * 0.5,  '☝', 'UP',    '#ffe14d'],   // 오른쪽 = 상승
      ];
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      for (const [x, y, icon, label, c] of zones) {
        ctx.globalAlpha = 0.16 * fade; ctx.fillStyle = c;
        ctx.beginPath(); ctx.arc(x, y, R, 0, 7); ctx.fill();
        ctx.globalAlpha = 0.7 * fade; ctx.strokeStyle = c; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x, y, R, 0, 7); ctx.stroke();
        ctx.globalAlpha = 0.95 * fade; ctx.fillStyle = '#fff';
        ctx.font = `${Math.round(R * 0.9)}px "Segoe UI", sans-serif`;
        ctx.fillText(icon, x, y - R * 0.12);
        ctx.fillStyle = c; ctx.font = `700 ${Math.round(R * 0.32)}px "Segoe UI", sans-serif`;
        ctx.fillText(label, x, y + R * 0.62);
      }
      ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic'; ctx.globalAlpha = 1;
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, Math.max(h, 0), r);
    ctx.fill();
  }

  // ---------- UI ----------
  const startScreen = document.getElementById('start-screen');
  const overScreen = document.getElementById('over-screen');
  applyLang();

  // 다음 코스 카운트다운 (UTC 자정에 코스 교체)
  function updateCourseTimer() {
    const now = new Date();
    const next = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1);
    let s = Math.max(0, ((next - now.getTime()) / 1000) | 0);
    const t = `${String((s / 3600) | 0).padStart(2, '0')}:${String(((s % 3600) / 60) | 0).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    document.getElementById('next-course').textContent = T('nextCourse').replace('{t}', t);
  }
  setInterval(updateCourseTimer, 1000);
  updateCourseTimer();

  // 전체화면 버튼: 탭하면 가로 전체화면 잠금 시도 (미지원 시 회전 표시로 대체됨)
  document.getElementById('fs-btn').addEventListener('pointerdown', e => e.stopPropagation());
  document.getElementById('fs-btn').addEventListener('click', e => {
    e.stopPropagation();
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) {
        Promise.resolve(req.call(el)).then(() => {
          try { if (screen.orientation && screen.orientation.lock) return screen.orientation.lock('landscape'); } catch (_) {}
        }).catch(() => {}).finally(() => setTimeout(resize, 200));
      }
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) { try { exit.call(document); } catch (_) {} }
      try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } catch (_) {}
      setTimeout(resize, 200);
    }
  });
  document.addEventListener('fullscreenchange', () => setTimeout(resize, 150));

  // 어제 세계 랭킹 배지 (락인 인센티브)
  (async () => {
    try {
      const myName = localStorage.getItem('ng-name');
      if (!myName || !LB_URL) return;
      const yd = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      const rows = await lbAll(yd);
      const idx = rows.findIndex(e => e.n === myName);
      if (idx >= 0) { yRankIdx = idx; document.getElementById('ybadge').textContent = T('yRank').replace('{n}', idx + 1); }
    } catch (_) {}
  })();

  function startGame() {
    ensureAudio();
    reset();
    state = 'play';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    updateHud();
    try { if (window.CrazyGames) CrazyGames.SDK.game.gameplayStart(); } catch (_) {}
  }
  document.getElementById('btn-start').addEventListener('click', e => { e.stopPropagation(); startGame(); });
  document.getElementById('btn-retry').addEventListener('click', e => { e.stopPropagation(); startGame(); });
  document.getElementById('btn-revive').addEventListener('click', e => { e.stopPropagation(); doRevive(); });
  document.getElementById('btn-revive').addEventListener('pointerdown', e => e.stopPropagation());
  document.getElementById('btn-skip-revive').addEventListener('click', e => {
    e.stopPropagation();
    clearInterval(reviveTimer);
    document.getElementById('revive-screen').classList.add('hidden');
    finishOver();
  });
  document.getElementById('btn-skip-revive').addEventListener('pointerdown', e => e.stopPropagation());

  // ---------- 점수 공유 ----------
  document.getElementById('btn-share').addEventListener('click', async e => {
    e.stopPropagation();
    const text = T('shareText').replace('{date}', dateStr).replace('{score}', score).replace('{url}', 'https://csj3814-create.github.io/neon-glide/');
    try {
      if (navigator.share) {
        await navigator.share({ text });
      } else {
        await navigator.clipboard.writeText(text);
        toast(T('copied'));
      }
    } catch (_) { /* 사용자가 공유 취소 */ }
  });

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
})();
</script>
</body>
</html>
